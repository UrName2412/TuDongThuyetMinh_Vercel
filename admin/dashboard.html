<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
  <div class="admin">
    <aside id="admin-sidebar" class="sidebar"></aside>

    <main class="content">
      <div class="main-content">
        <section class="dashboard">
          <article class="card blue">
            <h3>Tổng POI</h3>
            <p id="stat-poi-total">0</p>
          </article>
          <article class="card green">
            <h3>POI mới nhất</h3>
            <p id="stat-poi-latest">N/A</p>
          </article>
          <article class="card orange">
            <h3>Radius lớn nhất</h3>
            <p id="stat-radius-max">0 m</p>
          </article>
          <article class="card sky">
            <h3>Tổng lượt quét QR</h3>
            <p id="stat-qr-total">0</p>
          </article>
          <article class="card leaf">
            <h3>POI được quét nhiều nhất</h3>
            <p id="stat-qr-top-poi">N/A</p>
          </article>
        </section>

        <section class="table-container">
          <h2>5 POI mới thêm</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Tên quầy</th>
                <th>Mô tả</th>
                <th>Ảnh</th>
                <th>Lượt quét</th>
                <th>Quét gần nhất</th>
                <th>Vĩ độ</th>
                <th>Kinh độ</th>
                <th>Bán kính</th>
              </tr>
            </thead>
            <tbody id="recent-poi-body"></tbody>
          </table>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin-dashboard.js"></script>
</body>

</html>
