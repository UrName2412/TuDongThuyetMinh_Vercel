<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
  <div class="admin">
    <aside id="admin-sidebar" class="sidebar"></aside>

    <main class="content">
      <div class="main-content">
        <section class="dashboard">
          <article class="card blue">
            <h3>Tổng POI</h3>
            <p id="stat-poi-total">0</p>
          </article>
          <article class="card green">
            <h3>Tổng người dùng</h3>
            <p id="total-users-count">0</p>
          </article>
          <article class="card orange">
            <h3>Đang online</h3>
            <p id="online-users-count">0</p>
          </article>
          <!-- Đã xóa Tổng lượt truy cập -->
        </section>

        <section class="table-container">
          <h2>5 POI được thêm gần đây</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Tên quầy</th>
              </tr>
            </thead>
            <tbody id="top-visited-poi-body"></tbody>
          </table>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin-dashboard.js"></script>
</body>

</html>
