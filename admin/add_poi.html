<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm POI</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
  <div class="admin">
    <aside id="admin-sidebar" class="sidebar"></aside>
    <div class="content">
      <div class="main-content main-center">
        <div class="container">
          <h2>Thêm POI</h2>
          <form id="poi-form">
            <label for="poi-name">Tên quầy</label>
            <input id="poi-name" required>

            <label for="poi-description">Mô tả</label>
            <textarea id="poi-description" rows="4" required></textarea>

            <label for="poi-image">Ảnh</label>
            <input id="poi-image" type="file" accept="image/*" multiple>

            <label for="poi-lat">Latitude</label>
            <input id="poi-lat" required>

            <label for="poi-lng">Longitude</label>
            <input id="poi-lng" required>

            <label for="poi-radius">Radius (m)</label>
            <input id="poi-radius" type="number" min="1" value="50" required>

            <label for="poi-map-link">Link bản đồ (Map Link)</label>
            <input id="poi-map-link" type="text" placeholder="Link bản đồ (không bắt buộc)">

            <div id="map"></div>
            <button type="submit">Thêm POI</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="../assets/js/admin-add-poi.js"></script>
</body>

</html>
