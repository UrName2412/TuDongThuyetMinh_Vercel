<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách POI</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="admin">
    <aside id="admin-sidebar" class="sidebar"></aside>

    <main class="content">
      <div class="main-content">
        <section class="table-container">
          <div class="top-actions">
            <h2>Danh sách POI</h2>
            <button id="btn-open-add" class="btn add">Thêm POI</button>
          </div>

          <div class="search-box">
            <input id="search-poi" type="text" placeholder="Tìm POI...">
          </div>

          <div id="poi-form-panel" class="form-panel hidden">
            <h3 id="poi-form-title">Them POI</h3>
            <form id="poi-form">
              <label for="poi-name">Tên quầy</label>
              <input id="poi-name" required>

              <label for="poi-description">Mô tả</label>
              <textarea id="poi-description" rows="4" required></textarea>

              <label>Ảnh hiện tại</label>
              <div id="current-image">-</div>

              <label for="poi-image">Thay đổi ảnh</label>
              <input id="poi-image" type="file" accept="image/*">

              <label for="poi-lat">Latitude</label>
              <input id="poi-lat" type="number" step="any" required>

              <label for="poi-lng">Longitude</label>
              <input id="poi-lng" type="number" step="any" required>

              <label for="poi-radius">Radius (m)</label>
              <input id="poi-radius" type="number" min="1" required>

              <label for="poi-classification">Loại POI</label>
              <select id="poi-classification">
                <option value="major">Chính</option>
                <option value="minor">Phụ</option>
              </select>

              <label for="poi-minor-category">Danh mục phụ</label>
              <select id="poi-minor-category"></select>

              <div id="add-map"></div>

              <div class="button-row">
                <button type="submit">Lưu</button>
                <button id="btn-cancel-poi" type="button" class="btn reset">Hủy</button>
              </div>
            </form>
          </div>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Tên quầy</th>
                <th>Ảnh</th>
                <th>Mô tả</th>
                <th>Vĩ độ</th>
                <th>Kinh độ</th>
                <th>Bán kính</th>
                <th>Loại</th>
                <th>Danh mục phụ</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="poi-table-body"></tbody>
          </table>
        </section>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="../assets/js/admin-poi.js"></script>
</body>
</html>
